<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowy element html</title>
</head>
<body>
    <h1> Tworzenie nowego elementu HTML</h1>
</body>
<script>
    //tworzenie nowego paragrafu
    let newElement = document.createElement("p");
    //dodanie zawartosci (content) do nowego elementu
    newElement.textContent = "Tj nowy paragraf";
    //dodanie nowego elementu do ciała dokumentu
    document.body.appendChild(newElement);
</script>
</html>
