<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Hide() =  ukrywa element, show() - wyswietla element</h1>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"> </script>
    <button id="hide"> Ukryj akapit</button>
    <button id="show">Pokaz akapit</button>
     <p id="akapit1"> Pierwszy akapit</p>
     <script>

        $(function(){
            $("#hide").click( function(){
                $("#akapit1").hide();
            }); 
            
            $("#show").click(function() {
                $("#akapit1").show();
            });
        });
    </script>

    
    
</body>
</html>
