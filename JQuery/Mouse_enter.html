<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Ukrycie wybranego akapitu po najechaniu na niego myszką. </h1>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"> </script>

     <p id="akapit1"> Najedź myszką, aby mnie ukryć</p>
     <p> Drugi akapit</p>
     <script>

        $(function() {
            $("#akapit1").mouseenter( function(){
                $(this).hide();
            });
        });
    </script>

    
    
</body>
</html>
