<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hover() - obsługuje dwa zdarzenia: mouseenter i mouseout </h1>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"> </script>

     <p id="akapit1"> Najedź na mnie aby wyświetlić komnunikat</p>
     <p> Drugi akapit</p>
     <script>

        $(function(){
            $("#akapit1").hover( function(){
                alert("Witaj na mojej stronie");
            }, function() {
                alert("Do zobaczenia na mojej stronie");
            });
        });
    </script>

    
    
</body>
</html>
