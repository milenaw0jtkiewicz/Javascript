<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Ukrycie akapitu po jego kliknięciu </h1>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"> </script>

     <p> Kliknij, aby mnie ukryć</p>
     <script>

        $(function() {
            $("p").click( function(){
                $(this).hide();
            });
        });
    </script>

    
    
</body>
</html>
