<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p> Wyszukiwanie obrazka z rozszerzeniem .gif </p>
    <script>
        let tekst = "ikona jes w logo.gif";
        var gifRegex =/\S*\.gif/i;
        let position=tekst.search(gifRegex)
        document.write(tekst.slice(position));
    </script>
    
</body>
</html>
