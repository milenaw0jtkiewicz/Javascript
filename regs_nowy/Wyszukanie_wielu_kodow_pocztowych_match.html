    <h3> Wyrazenie regularne - kody pocztowe</h3>
    <script>
        const tekst = "34-220 Maków Podhalański, 34-200 Sucha Beskidzka, 34-210, 34-205";
        var wzorzec=/\d{2}-\d{3}/g;
        // to g oznacza global czyli wyszstkie mozliwe
        let kody_pocztowe=tekst.match(wzorzec);
        kody_pocztowe.forEach(function(kod){
            console.log(kod);
            })   
        
            
    </script>
